# databricks.yml
bundle:
  name: lab7-bundle

sync:
  include:
    - src/**

# Глобальні змінні
variables:
  catalog_dev:
    description: "Catalog name DEV"
    default: "dbr_dev"
  catalog_prod:
    description: "Catalog name PROD"
    default: "dbr_prod"   
  schema_bronze:
    default: "koval_bronze"
  schema_silver:
    default: "koval_silver"  
  schema_gold:
    default: "koval_gold"
  raw_input_path:
    description: "Path to raw incremental files"
  warehouse_id_dev:
    description: "Databricks SQL Warehouse ID DEV"
  warehouse_id_prod:
    description: "Databricks SQL Warehouse ID PROD"  

targets:
# _________________DEV____________________
  dev:
    default: true
    mode: development
    workspace:
      host: https://adb-7405605185991044.4.azuredatabricks.net
      root_path: /Workspace/Users/${workspace.current_user.userName}/${bundle.name}/${bundle.target}

    resources:
      pipelines:
        lab7_etl_pipeline:
          name: "[DEV] Lab7 - Medallion ETL Pipeline"
          catalog: ${var.catalog_dev}
          schema: ${var.schema_bronze}
          development: true

          clusters:
            - label: "default"
              node_type_id: "Standard_F4"
              num_workers: 0
              spark_conf:
                spark.databricks.cluster.profile: singleNode
                spark.master: local[*]
              custom_tags:
                ResourceClass: SingleNode

          libraries:
            - file:
                path: src/01_source_to_bronze.py
            - file:
                path: src/02_bronze_to_silver.py
            - file:
                path: src/03_silver_to_gold.py
          configuration:
            my.raw_path: ${var.raw_input_path}        

      jobs:
        lab7_daily_job:
          name: "[DEV] Lab7 - Daily Medallion Job"
          job_clusters:
          - job_cluster_key: lab7_koval_cluster
            new_cluster:
              spark_version: "13.3.x-scala2.12"
              node_type_id: "Standard_F4"
              num_workers: 0
              data_security_mode: SINGLE_USER
              spark_conf:
                spark.databricks.cluster.profile: singleNode
                spark.master: local[*]
                my.raw_path:       ${var.raw_input_path}
                my.catalog:        ${var.catalog_dev}
                my.schema_bronze:  ${var.schema_bronze}
                my.schema_silver:  ${var.schema_silver}
                my.schema_gold:    ${var.schema_gold}
                spark.databricks.delta.schema.autoMerge.enabled: "true"
                fs.azure.account.key.sadlsdev.dfs.core.windows.net: "{{secrets/kvbddev-scope/storagekey}}"

              custom_tags:
                ResourceClass: SingleNode

          tasks:
            - task_key: generate_data
              job_cluster_key: lab7_koval_cluster
              spark_python_task:
                python_file: src/00_generate_data.py   

            - task_key: run_pipeline
              depends_on:
                - task_key: generate_data
              pipeline_task:
                pipeline_id: ${resources.pipelines.lab7_etl_pipeline.id}
            
            - task_key: apply_security
              depends_on:
                - task_key: run_pipeline
              job_cluster_key: lab7_koval_cluster
              spark_python_task:
                python_file: src/04_security.py    

      dashboards:
        sessions_dashboard:
          display_name: "[DEV] Lab7 - Medallion Sessions Dashboard"
          warehouse_id: ${var.warehouse_id_dev}
          file_path: dashboard/sessions_dashboard_dev.lvdash.json   

# _____________________PROD_______________________
  prod:
    mode: production
    workspace:
      host: https://adb-7405608700467273.13.azuredatabricks.net 
      root_path: /Workspace/Users/${workspace.current_user.userName}/${bundle.name}/${bundle.target}


    resources:
      pipelines:
        lab7_etl_pipeline:
          name: "[PROD] Lab7 - Medallion ETL Pipeline"
          catalog: ${var.catalog_prod}
          schema: ${var.schema_bronze}
          development: false

          clusters:
            - label: "default"
              node_type_id: "Standard_F4"
              num_workers: 0
              spark_conf:
                spark.databricks.cluster.profile: singleNode
                spark.master: local[*]
              custom_tags:
                ResourceClass: SingleNode

          libraries:
            - file:
                path: src/01_source_to_bronze.py
            - file:
                path: src/02_bronze_to_silver.py
            - file:
                path: src/03_silver_to_gold.py
          configuration:
            my.raw_path: ${var.raw_input_path}            

      jobs:
        lab7_daily_job:
          name: "[PROD] Lab7 - Daily Medallion Job"
          job_clusters:
          - job_cluster_key: lab7_koval_cluster
            new_cluster:
              spark_version: "13.3.x-scala2.12"
              node_type_id: "Standard_F4"
              num_workers: 0
              data_security_mode: SINGLE_USER
              spark_conf:
                spark.databricks.cluster.profile: singleNode
                spark.master: local[*]
                my.raw_path:       ${var.raw_input_path}
                my.catalog:        ${var.catalog_prod}
                my.schema_bronze:  ${var.schema_bronze}
                my.schema_silver:  ${var.schema_silver}
                my.schema_gold:    ${var.schema_gold} 
                spark.databricks.delta.schema.autoMerge.enabled: "true"
                fs.azure.account.key.sadlsdev.dfs.core.windows.net: "{{secrets/kvbddev-scope/storagekey}}"

              custom_tags:
                ResourceClass: SingleNode

          tasks:
            - task_key: generate_data
              job_cluster_key: lab7_koval_cluster
              spark_python_task:
                python_file: src/00_generate_data.py

            - task_key: run_pipeline
              depends_on:
                - task_key: generate_data
              pipeline_task:
                pipeline_id: ${resources.pipelines.lab7_etl_pipeline.id}

            - task_key: apply_security
              depends_on:
                - task_key: run_pipeline
              job_cluster_key: lab7_koval_cluster
              spark_python_task:
                python_file: src/04_security.py   

      dashboards:
        sessions_dashboard:
          display_name: "[PROD] Lab7 - Medallion Sessions Dashboard"
          warehouse_id: ${var.warehouse_id_prod}
          file_path: dashboard/sessions_dashboard_prod.lvdash.json 

    permissions:
      - group_name: senior_analysts
        level: CAN_MANAGE  
      - group_name: users
        level: CAN_VIEW
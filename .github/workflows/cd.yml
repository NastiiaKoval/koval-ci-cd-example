# .github/workflows/cd.yml
# Runs on merge to main — deploys dev → prod

name: CD — Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:

  # ── DEV ─────────────────────────────────────────
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy to DEV
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          RAW_INPUT_PATH: ${{ secrets.RAW_INPUT_PATH }}
          WAREHOUSE_ID_DEV: ${{ secrets.WAREHOUSE_ID_DEV }}
          WAREHOUSE_ID_PROD: ${{ secrets.WAREHOUSE_ID_PROD }}
        run: |
          databricks bundle deploy --target dev \
          --var "raw_input_path=${RAW_INPUT_PATH}" \
          --var "warehouse_id_dev=${WAREHOUSE_ID_DEV}" \
          --var "warehouse_id_prod=${WAREHOUSE_ID_PROD}" 

      - name: Run job on DEV
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle run lab7_daily_job --target dev

  # ── PROD ────────────────────────────────────────
  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: deploy-dev          # runs only after dev succeeded
    environment: production    # manual approval gate

    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy to PROD
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
          RAW_INPUT_PATH: ${{ secrets.RAW_INPUT_PATH }}
          WAREHOUSE_ID_DEV: ${{ secrets.WAREHOUSE_ID_DEV }}
          WAREHOUSE_ID_PROD: ${{ secrets.WAREHOUSE_ID_PROD }}
        run: |
          databricks bundle deploy --target prod \
          --var "raw_input_path=${RAW_INPUT_PATH}" \
          --var "warehouse_id_dev=${WAREHOUSE_ID_DEV}" \
          --var "warehouse_id_prod=${WAREHOUSE_ID_PROD}" 

      - name: Run job on PROD
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
        run: |
          databricks bundle run lab7_daily_job --target prod

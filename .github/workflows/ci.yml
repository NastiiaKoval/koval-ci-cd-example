# .github/workflows/ci.yml
# Runs on every PR to main — validates bundle before merge

name: CI — Validate Bundle

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate DAB bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle (dev target)
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          RAW_INPUT_PATH: ${{ secrets.RAW_INPUT_PATH }}
          WAREHOUSE_ID_PROD: ${{ secrets.WAREHOUSE_ID_PROD }}
          WAREHOUSE_ID_DEV: ${{ secrets.WAREHOUSE_ID_DEV }}
        run: |
          databricks bundle validate --target dev \
          --var "raw_input_path=${RAW_INPUT_PATH}" \
          --var "warehouse_id_dev=${WAREHOUSE_ID_DEV}" 
          --var "warehouse_id_prod=${WAREHOUSE_ID_PROD}" 
